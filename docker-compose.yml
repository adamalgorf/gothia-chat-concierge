services:
  app:
    build:
      context: .
      args:
        VITE_SUPABASE_URL: ${LOCAL_SUPABASE_PUBLIC_URL:-http://localhost:54321}
        VITE_SUPABASE_PUBLISHABLE_KEY: ${LOCAL_SUPABASE_PUBLISHABLE_KEY:-eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsImV4cCI6MjUyNDYwODAwMCwicm9sZSI6ImFub24ifQ.eNaURy5PHhaWtLWU7Yj4qA6U4FAwcBAL_eE5lMce7Hk}
    depends_on:
      supabase-gateway:
        condition: service_started
      supabase-db:
        condition: service_healthy
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: 3000
      DATABASE_URL: postgres://postgres:${LOCAL_POSTGRES_PASSWORD:-postgres}@supabase-db:5432/postgres
      SUPABASE_URL: http://supabase-gateway:8000
      SUPABASE_PUBLISHABLE_KEY: ${LOCAL_SUPABASE_PUBLISHABLE_KEY:-eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsImV4cCI6MjUyNDYwODAwMCwicm9sZSI6ImFub24ifQ.eNaURy5PHhaWtLWU7Yj4qA6U4FAwcBAL_eE5lMce7Hk}
      SUPABASE_SERVICE_ROLE_KEY: ${LOCAL_SUPABASE_SERVICE_ROLE_KEY:-eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsImV4cCI6MjUyNDYwODAwMCwicm9sZSI6InNlcnZpY2Vfcm9sZSJ9.O6Wa79dwbLUtrDBKi27_JWDjMaOQULmWoky3NAFgQec}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-https://api.openai.com/v1}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-5.2}
    ports:
      - "${APP_PORT:-3000}:3000"
    restart: unless-stopped

  supabase-gateway:
    image: nginx:1.27-alpine
    depends_on:
      rest:
        condition: service_started
    ports:
      - "${SUPABASE_PORT:-54321}:8000"
    volumes:
      - ./docker/supabase/gateway.conf:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped

  rest:
    image: postgrest/postgrest:v12.2.8
    depends_on:
      supabase-db:
        condition: service_healthy
    environment:
      PGRST_DB_URI: postgres://authenticator:postgres@supabase-db:5432/postgres
      PGRST_DB_SCHEMAS: public
      PGRST_DB_ANON_ROLE: anon
      PGRST_JWT_SECRET: ${LOCAL_JWT_SECRET:-super-secret-jwt-token-with-at-least-32-characters-long}
      PGRST_SERVER_PORT: 3000
      PGRST_OPENAPI_SERVER_PROXY_URI: http://localhost:${SUPABASE_PORT:-54321}/rest/v1
    restart: unless-stopped

  supabase-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: postgres
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${LOCAL_POSTGRES_PASSWORD:-postgres}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d postgres"]
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - supabase-db-data:/var/lib/postgresql/data
      - ./docker/supabase/init:/docker-entrypoint-initdb.d:ro
      - ./supabase/migrations:/supabase-migrations:ro
    ports:
      - "${POSTGRES_PORT:-54322}:5432"
    restart: unless-stopped

volumes:
  supabase-db-data:
